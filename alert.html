<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Alpha Scout Alert</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f7;
            color: #1d1d1f;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* Hero image */
        .hero {
            position: relative;
            width: 100%;
            height: 280px;
            overflow: hidden;
            background: #1d1d1f;
        }
        .hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .hero-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60%;
            background: linear-gradient(transparent, rgba(0,0,0,0.85));
        }
        .hero-title {
            position: absolute;
            bottom: 32px;
            left: 16px;
            right: 16px;
            color: #fff;
            font-size: 20px;
            font-weight: 700;
            line-height: 1.3;
            text-shadow: 0 1px 4px rgba(0,0,0,0.5);
        }
        .badge-tier {
            position: absolute;
            top: 12px;
            left: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 600;
            color: #fff;
        }
        .badge-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        .badge-dot.high { background: #30d158; }
        .badge-dot.medium { background: #ffd60a; }
        .badge-dot.speculative { background: #ff453a; }

        .badge-logo {
            position: absolute;
            top: 12px;
            right: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 4px 12px 4px 4px;
            font-size: 11px;
            font-weight: 600;
            color: #fff;
        }
        .badge-logo img {
            width: 24px;
            height: 24px;
            border-radius: 12px;
            object-fit: cover;
        }

        /* Card */
        .card {
            position: relative;
            margin-top: -20px;
            background: #fff;
            border-radius: 20px 20px 0 0;
            padding: 24px 16px 32px;
            min-height: calc(100vh - 260px);
        }

        /* Metric row */
        .metrics {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }
        .metric {
            flex: 1;
            background: #f5f5f7;
            border-radius: 14px;
            padding: 14px 10px;
            text-align: center;
        }
        .metric-label {
            font-size: 11px;
            color: #86868b;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 4px;
        }
        .metric-value {
            font-size: 22px;
            font-weight: 700;
            color: #1d1d1f;
        }
        .metric-value.profit {
            color: #30d158;
        }
        .metric-sub {
            font-size: 12px;
            color: #30d158;
            font-weight: 600;
            margin-top: 2px;
        }

        /* AI insight */
        .insight {
            border-left: 3px solid #007aff;
            background: #f0f5ff;
            border-radius: 0 12px 12px 0;
            padding: 14px 16px;
            margin-bottom: 20px;
        }
        .insight-label {
            font-size: 11px;
            color: #007aff;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 6px;
        }
        .insight-text {
            font-size: 14px;
            font-style: italic;
            color: #3a3a3c;
            line-height: 1.5;
        }

        /* Confidence bar */
        .confidence {
            margin-bottom: 24px;
        }
        .confidence-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .confidence-label {
            font-size: 13px;
            color: #86868b;
            font-weight: 500;
        }
        .confidence-pct {
            font-size: 13px;
            color: #1d1d1f;
            font-weight: 700;
        }
        .confidence-bar {
            height: 8px;
            background: #e5e5ea;
            border-radius: 4px;
            overflow: hidden;
        }
        .confidence-fill {
            height: 100%;
            border-radius: 4px;
            background: linear-gradient(90deg, #30d158, #34c759);
            transition: width 0.8s ease-out;
        }

        /* Buttons */
        .btn-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px 16px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            transition: opacity 0.2s;
        }
        .btn:active { opacity: 0.7; }
        .btn-primary {
            background: #007aff;
            color: #fff;
        }
        .btn-secondary {
            background: #e5e5ea;
            color: #1d1d1f;
        }
        .btn-full {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            background: #f5f5f7;
            color: #3a3a3c;
            margin-bottom: 20px;
            transition: opacity 0.2s;
        }
        .btn-full:active { opacity: 0.7; }

        /* Divider */
        .divider {
            height: 1px;
            background: #e5e5ea;
            margin: 0 0 16px;
        }

        /* Telegram link */
        .tg-link {
            display: block;
            text-align: center;
            color: #007aff;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            margin-bottom: 16px;
        }

        /* Timestamp */
        .timestamp {
            text-align: center;
            font-size: 12px;
            color: #aeaeb2;
        }

        /* Empty state */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 32px;
            text-align: center;
        }
        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        .empty-title {
            font-size: 20px;
            font-weight: 700;
            color: #1d1d1f;
            margin-bottom: 8px;
        }
        .empty-text {
            font-size: 15px;
            color: #86868b;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        const ALERT_URL = "current_alert.json";

        function tierLabel(tier) {
            if (tier === "HIGH") return "High Confidence";
            if (tier === "MEDIUM") return "Medium Confidence";
            return "Speculative";
        }
        function tierClass(tier) {
            if (tier === "HIGH") return "high";
            if (tier === "MEDIUM") return "medium";
            return "speculative";
        }

        function renderAlert(d) {
            return `
            <div class="hero">
                <img src="${d.image_url}" alt="${d.title}" onerror="this.style.display='none'">
                <div class="hero-overlay"></div>
                <div class="badge-tier">
                    <span class="badge-dot ${tierClass(d.tier)}"></span>
                    ${tierLabel(d.tier)}
                </div>
                <div class="badge-logo">
                    <img src="/alpha-scout/logo.png" alt="Logo">
                    Alpha Scout
                </div>
                <div class="hero-title">${d.title}</div>
            </div>

            <div class="card">
                <div class="metrics">
                    <div class="metric">
                        <div class="metric-label">Estate Price</div>
                        <div class="metric-value">$${d.estate_price}</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">Est. Value</div>
                        <div class="metric-value">$${d.market_estimate}</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">Profit</div>
                        <div class="metric-value profit">+$${d.gross_profit}</div>
                        <div class="metric-sub">+${d.profit_pct}%</div>
                    </div>
                </div>

                <div class="insight">
                    <div class="insight-label">AI Analysis</div>
                    <div class="insight-text">${d.key_signals}</div>
                </div>

                <div class="confidence">
                    <div class="confidence-header">
                        <span class="confidence-label">Gemini Confidence</span>
                        <span class="confidence-pct">${d.confidence}%</span>
                    </div>
                    <div class="confidence-bar">
                        <div class="confidence-fill" style="width: ${d.confidence}%"></div>
                    </div>
                </div>

                <div class="btn-row">
                    <a class="btn btn-primary" href="${d.estate_url}" target="_blank">View Listing</a>
                    <a class="btn btn-secondary" href="${d.etsy_url}" target="_blank">Search Etsy</a>
                </div>
                <a class="btn-full" href="${d.google_url}" target="_blank">Google This Item</a>

                <div class="divider"></div>
                <a class="tg-link" href="https://t.me/Alpha_Scouting_bot">View all alerts in Telegram</a>
                <div class="timestamp">Scouted at ${d.scouted_at}</div>
            </div>`;
        }

        function renderEmpty() {
            return `
            <div class="empty-state">
                <div class="empty-icon">\u{1F50D}</div>
                <div class="empty-title">No alerts yet</div>
                <div class="empty-text">Check back after 2 AM Denver time.<br>Alpha Scout scans every morning.</div>
            </div>`;
        }

        async function init() {
            const app = document.getElementById("app");
            try {
                const resp = await fetch(ALERT_URL + "?t=" + Date.now());
                if (!resp.ok) throw new Error(resp.status);
                const data = await resp.json();
                if (!data.title) throw new Error("empty");
                app.innerHTML = renderAlert(data);
            } catch (e) {
                app.innerHTML = renderEmpty();
            }
        }

        init();
    </script>
</body>
</html>
